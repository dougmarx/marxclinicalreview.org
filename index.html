<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marx Clinical Review</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #081a33, #1f3f6d);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    .logo {
      width: 160px;
      margin-bottom: 25px;
      filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.45));
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      background-color: #ffffff;
      color: #1f3f6d;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.25s ease;
    }

    .btn:hover {
      background-color: #dbe6f5;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="Marx Clinical Review Logo" class="logo">

    <!-- TITLE -->
    <h1>Marx Clinical Review</h1>

    <!-- TAGLINE -->
    <p>Modern, high-yield clinical education for today’s physician</p>

    <!-- CONTACT BUTTON -->
    <a href="mailto:info@marxclinicalreview.org" class="btn">
      Contact
    </a>

  </div>
</body>
</html>
